<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sudoku Client</title>
<style>
table {
    border-collapse: collapse;
}
td {
    width: 40px;
    height: 40px;
    border: 1px solid black;
    text-align: center;
    font-size: 20px;
    cursor: pointer;
}
td input {
    width: 100%;
    height: 100%;
    text-align: center;
    font-size: 20px;
    border: none;
}
</style>
</head>
<body>

<h2>Sudoku</h2>
<p>Клик по клетке и введи цифру (1–9)</p>
<p>Жизни: <span id="lives">3</span></p>
<table id="sudoku"></table>

<script>
const ws = new WebSocket("ws://localhost:5000/ws");

let grid = []; // локальная копия доски
let playerID = null; // при необходимости

ws.onopen = () => {
    console.log("connected to server");
};

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    console.log("received:", data);

    // если сервер прислал количество жизней
    if (data.lives !== undefined) {
        updateLives(data.lives);
    }

    // если сервер прислал ход
    if (data.row !== undefined && data.col !== undefined && data.value !== undefined) {
        grid[data.row][data.col] = data.value;
    }

    // если сервер прислал всю доску
    if (data.puzzle !== undefined) {
        grid = data.puzzle;
    }

    drawSudoku(grid);
};

ws.onclose = () => {
    console.log("connection closed");
};

function drawSudoku(board) {
    const table = document.getElementById("sudoku");
    table.innerHTML = "";

    for (let i = 0; i < board.length; i++) {
        const row = document.createElement("tr");

        for (let j = 0; j < board[i].length; j++) {
            const cell = document.createElement("td");
            const value = board[i][j];

            if (value === 0) {
                const input = document.createElement("input");
                input.type = "text";
                input.maxLength = 1;

                input.addEventListener("input", (e) => {
                    let val = parseInt(e.target.value);
                    if (!val || val < 1 || val > 9) {
                        e.target.value = "";
                        return;
                    }
                    grid[i][j] = val;
                    sendMove(i, j, val);
                });

                cell.appendChild(input);
            } else {
                cell.textContent = value;
            }

            row.appendChild(cell);
        }

        table.appendChild(row);
    }
}

function sendMove(row, col, value) {
    const move = {
        row: row,
        col: col,
        value: value
        // player_id: playerID // если нужно
    };
    ws.send(JSON.stringify(move));
}

function updateLives(lives) {
    document.getElementById("lives").textContent = lives;
}
</script>

</body>
</html>
